<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硬币狂欢</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 💰 金色粒子 -->
<div class="gold-bg"></div>

<div class="app">

<!-- ================= 登录页 ================= -->
<div id="loginBox" class="card">

<div class="logo">💰</div>
<h1 class="title">硬币狂欢</h1>
<p class="subtitle">财富从一次选择开始</p>

<!-- 🔥 主视觉硬币 -->
<div class="coin-hero">
  <div class="coin-inner">
    <img src="coin.png.PNG" class="coin-face front">
    <img src="coin.png2.PNG" class="coin-face back">
  </div>
</div>

<div class="tagline">贪婪 · 运气 · 爆发</div>

<input id="username" placeholder="输入账号">
<input id="password" type="password" placeholder="输入密码">

<button onclick="login()">进入赌局</button>
<button class="ghost" onclick="register()">创建账号</button>

<p id="msg"></p>

</div>

<!-- ================= 游戏页 ================= -->
<div id="gameBox" class="card hidden">

<div class="top">
  <div>
    玩家：<span id="name"></span><br>
    ID：<span id="userId"></span>
  </div>
  <button onclick="logout()">退出</button>
</div>

<div class="coin" id="coin">
  <img id="coinImg" src="coin.png.PNG">
</div>

<div id="coinText">准备开始</div>

<div class="btns">
  <button onclick="play('正面')">正面</button>
  <button onclick="play('反面')">反面</button>
</div>

<div id="result"></div>

<div class="stats">
  <div>积分<br><b id="score"></b></div>
  <div>连胜<br><b id="streak"></b></div>
  <div>次数<br><b id="times"></b></div>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
