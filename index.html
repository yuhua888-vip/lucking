<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硬币狂欢</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<!-- 登录页 -->
<div id="loginBox" class="card">

<h1 class="title">硬币狂欢</h1>
<p class="sub">Good luck！今晚看你的运气</p>

<!-- ✅ 修复后的旋转硬币 -->
<div class="home-coin-3d">
  <div class="home-coin-inner">
    <img class="coin-face front" src="coin.png.PNG">
    <img class="coin-face back" src="coin.png2.PNG">
  </div>
</div>

<input id="username" placeholder="请输入用户名">
<input id="password" type="password" placeholder="请输入密码">

<button onclick="login()">进入狂欢</button>
<button onclick="register()">创建账号</button>

<p id="msg"></p>

</div>

<!-- 游戏页 -->
<div id="gameBox" class="card game-hidden">

<div>玩家：<span id="name"></span></div>
<div>ID：<span id="userId"></span></div>

<button onclick="logout()">退出</button>

<div class="coin" id="coin">
<img id="coinImg" src="coin.png.PNG">
</div>

<div id="coinText">等待开始</div>

<button onclick="play('正面')">猜正面</button>
<button onclick="play('反面')">猜反面</button>

<div id="result">准备开始</div>

<div>积分：<span id="score"></span></div>
<div>连胜：<span id="streak"></span></div>
<div>次数：<span id="times"></span></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
