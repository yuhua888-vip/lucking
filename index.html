<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字概率硬币</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- 登录页 -->
  <div id="loginBox" class="login-page">

    <div class="logo">LUCK COIN</div>

    <h1>数字概率硬币</h1>
    <p class="subtitle">你能连胜几次？</p>

    <div class="coin-wrap">
      <div class="coin-small">￥</div>
    </div>

    <div class="login-card">
      <input id="username" placeholder="用户名">
      <input id="password" type="password" placeholder="密码">

      <button class="main-btn" onclick="login()">进入挑战</button>
      <button class="ghost-btn" onclick="register()">注册账号</button>

      <p id="msg"></p>
    </div>

    <div class="tip">
      🎯 概率模拟 · 🔥 连胜挑战 · 💎 娱乐积分
    </div>

  </div>

  <!-- 游戏页 -->
  <div id="gameBox" class="card" style="display:none;">

    <div class="top">
      <span>玩家：<b id="name"></b></span>
      <button onclick="logout()">退出</button>
    </div>

    <div class="coin" id="coin">
      <span id="coinText">?</span>
    </div>

    <div class="btns">
      <button class="blue" onclick="play('正面')">正面</button>
      <button class="purple" onclick="play('反面')">反面</button>
    </div>

    <div id="result" class="result">准备开始</div>

    <div class="stats">
      <div><p>积分</p><strong id="score">0</strong></div>
      <div><p>连胜</p><strong id="streak">0</strong></div>
      <div><p>次数</p><strong id="times">10</strong></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
