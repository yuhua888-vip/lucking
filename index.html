<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硬币狂欢</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="coinExplosion"></div>

<div class="app">

<div id="loginBox">
<h1>硬币狂欢</h1>

<input id="username" placeholder="账号：5位字母+数字">
<input id="password" type="password" placeholder="密码：5位字母+数字">

<button onclick="login()">进入</button>
<button onclick="register()">注册</button>
<p id="msg"></p>
</div>

<div id="gameBox" class="hidden">

<div id="entertainmentPanel">

<div>玩家：<span id="name"></span></div>
<div>积分：<span id="score"></span></div>

<h2 id="countdown">倒计时：8</h2>

<div class="coin" id="coin">
<img id="coinImg" src="coin.png.PNG">
</div>

<div class="bet-area">
  <div class="bet-side">
    <h3>反面</h3>
    <button onclick="bet('反面',10)">+10</button>
    <button onclick="bet('反面',50)">+50</button>
  </div>

  <div class="bet-side">
    <h3>正面</h3>
    <button onclick="bet('正面',10)">+10</button>
    <button onclick="bet('正面',50)">+50</button>
  </div>
</div>

<div id="result">等待下注...</div>

<div class="road-title">路子</div>
<div id="roadMap" class="road-map"></div>

</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
